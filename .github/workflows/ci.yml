name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          cache: true

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test (Unix)
        if: runner.os != 'Windows'
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:PATH = "${{ env.QT_ROOT_DIR }}\bin;$env:PATH"
          $testExe = Get-ChildItem -Path build -Recurse -Filter "tst_qsearchableindex.exe" | Select-Object -First 1
          Write-Host "Test executable: $($testExe.FullName)"
          $proc = Start-Process -FilePath $testExe.FullName -ArgumentList "-v2" -NoNewWindow -PassThru -Wait -RedirectStandardOutput "test_stdout.txt" -RedirectStandardError "test_stderr.txt"
          Write-Host "Exit code: $($proc.ExitCode)"
          Write-Host "--- STDOUT ---"
          Get-Content "test_stdout.txt" -ErrorAction SilentlyContinue
          Write-Host "--- STDERR ---"
          Get-Content "test_stderr.txt" -ErrorAction SilentlyContinue
          exit $proc.ExitCode

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.1'
          cache: true

      - name: Generate documentation
        run: qdoc docs/qsearchable.qdocconf --outputdir build/docs
        env:
          QT_INSTALL_HEADERS: ${{ env.QT_ROOT_DIR }}/include
          QT_INSTALL_DOCS: ${{ env.QT_ROOT_DIR }}/doc

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/docs
